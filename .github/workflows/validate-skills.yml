name: Validate DotCore Skills
on:
  push:
    paths:
      - "skills/**"
      - "README.md"
      - "docs/audit/**"
  pull_request:
    paths:
      - "skills/**"
      - "README.md"
      - "docs/audit/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check SKILL.md exists and has frontmatter
        run: |
          set -e
          for dir in skills/*/; do
            skill="$(basename "$dir")"
            if [[ "$skill" == _* ]]; then
              continue
            fi
            file="${dir}SKILL.md"
            if [[ ! -f "$file" ]]; then
              echo "Missing SKILL.md in $skill"
              exit 1
            fi
            head -1 "$file" | grep -q '^---$' || { echo "No YAML frontmatter in $skill"; exit 1; }
            grep -q '^name:' "$file" || { echo "No name: in $skill"; exit 1; }
            grep -q '^description:' "$file" || { echo "No description: in $skill"; exit 1; }
            name=$(grep '^name:' "$file" | head -1 | sed 's/name:[[:space:]]*//')
            if [[ "$name" != "$skill" ]]; then
              echo "Folder name '$skill' != name '$name'"
              exit 1
            fi
            echo "OK: $skill"
          done

      - name: Check audit badge links resolve to existing reports
        run: |
          set -e
          if [[ -f README.md ]] && grep -q '<!-- audit:start -->' README.md; then
            block=$(sed -n '/<!-- audit:start -->/,/<!-- audit:end -->/p' README.md)
            hrefs=$(printf '%s\n' "$block" | grep -o 'href="[^"]*"' | sed -E 's/href="([^"]*)"/\1/')
            if [[ -z "$hrefs" ]]; then
              echo "FAIL: audit block present but contains no linked badges"
              exit 1
            fi
            rc=0
            while IFS= read -r href; do
              [[ -z "$href" ]] && continue
              if [[ -f "$href" ]]; then
                echo "OK: audit link -> $href"
              else
                echo "FAIL: audit badge points to a missing report: $href"
                rc=1
              fi
            done <<< "$hrefs"
            exit $rc
          else
            echo "No audit block in README - nothing to check"
          fi
