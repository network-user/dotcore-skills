name: Validate DotCore Skills
on:
  push:
    paths:
      - "skills/**"
      - "README.md"
      - "docs/audit/**"
  pull_request:
    paths:
      - "skills/**"
      - "README.md"
      - "docs/audit/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SKILL.md exists and has frontmatter
        run: |
          set -e
          for dir in skills/*/; do
            skill="$(basename "$dir")"
            if [[ "$skill" == _* ]]; then
              continue
            fi
            file="${dir}SKILL.md"
            if [[ ! -f "$file" ]]; then
              echo "Missing SKILL.md in $skill"
              exit 1
            fi
            head -1 "$file" | grep -q '^---$' || { echo "No YAML frontmatter in $skill"; exit 1; }
            grep -q '^name:' "$file" || { echo "No name: in $skill"; exit 1; }
            grep -q '^description:' "$file" || { echo "No description: in $skill"; exit 1; }
            name=$(grep '^name:' "$file" | head -1 | sed 's/name:[[:space:]]*//')
            if [[ "$name" != "$skill" ]]; then
              echo "Folder name '$skill' != name '$name'"
              exit 1
            fi
            echo "OK: $skill"
          done

      - name: Check audit badge links to an existing report
        run: |
          set -e
          if [[ -f README.md ]] && grep -q '<!-- audit:start -->' README.md; then
            line=$(grep 'security_audit' README.md | head -1)
            href=$(printf '%s' "$line" | sed -nE 's/.*href="([^"]+)".*/\1/p')
            if [[ -z "$href" ]]; then
              echo "FAIL: audit block present but security_audit badge has no href link"
              exit 1
            fi
            if [[ ! -f "$href" ]]; then
              echo "FAIL: audit badge points to a missing report: $href"
              exit 1
            fi
            echo "OK: audit badge -> $href"
          else
            echo "No audit block in README - nothing to check"
          fi
